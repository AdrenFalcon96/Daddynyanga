workflows:
  samanyanga-android:
    name: Samanyanga Companion — Android APK
    max_build_duration: 60
    environment:
      node: 20.19.0
      java: 17
      groups:
        - keystore_credentials
      vars:
        PACKAGE_NAME: "zw.co.samanyanga.companion"
        ANDROID_OUTPUT: artifacts/samanyanga/android/app/build/outputs/apk

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      - name: Install pnpm
        script: |
          npm install -g pnpm@10

      - name: Install project dependencies
        script: |
          pnpm install --no-frozen-lockfile
        working_directory: /home/runner/project

      - name: Build web assets for mobile
        script: |
          BASE_PATH=/ pnpm --filter @workspace/samanyanga run build:mobile

      - name: Add Android platform (first time only)
        script: |
          cd artifacts/samanyanga
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor with Android
        script: |
          cd artifacts/samanyanga
          npx cap sync android

      - name: Set app version from build number
        script: |
          PROPERTIES_FILE="artifacts/samanyanga/android/app/build.gradle"
          sed -i "s/versionCode .*/versionCode $BUILD_NUMBER/" "$PROPERTIES_FILE"
          sed -i "s/versionName .*/versionName \"1.0.$BUILD_NUMBER\"/" "$PROPERTIES_FILE"

      - name: Build debug APK (unsigned — for testing)
        script: |
          cd artifacts/samanyanga/android
          ./gradlew assembleDebug

      - name: Build release APK (signed — for distribution)
        script: |
          cd artifacts/samanyanga/android
          # Decode keystore from base64 secret
          echo "$KEYSTORE_B64" | base64 -d > app/keystore/release.jks
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/app/keystore/release.jks \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD

    artifacts:
      - artifacts/samanyanga/android/app/build/outputs/apk/debug/app-debug.apk
      - artifacts/samanyanga/android/app/build/outputs/apk/release/app-release.apk

    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true
