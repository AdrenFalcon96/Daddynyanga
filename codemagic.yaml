workflows:
  samanyanga-android:
    name: Samanyanga Companion — Android APK
    max_build_duration: 60
    environment:
      node: 22.16.0
      java: 21
      groups:
        - keystore_credentials
      vars:
        PACKAGE_NAME: "zw.co.samanyanga.companion"
        VITE_API_URL: ""  # Set this to your deployed API URL

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      - name: Install pnpm (if not already present)
        script: |
          corepack enable pnpm || npm install -g pnpm@10
          which pnpm || npm install -g pnpm@10

      - name: Install project dependencies
        script: |
          pnpm install --no-frozen-lockfile

      - name: Build web assets for mobile
        script: |
          BASE_PATH=/ VITE_API_URL=$VITE_API_URL pnpm --filter @workspace/samanyanga run build:mobile

      - name: Add Android platform (first time only)
        script: |
          cd artifacts/samanyanga
          if [ ! -d "android" ]; then
            ./node_modules/.bin/cap add android
          fi

      - name: Sync Capacitor with Android
        script: |
          cd artifacts/samanyanga
          ./node_modules/.bin/cap sync android

      - name: Set app version from build number
        script: |
          GRADLE_FILE="artifacts/samanyanga/android/app/build.gradle"
          sed -i "s/versionCode [0-9]*/versionCode $BUILD_NUMBER/" "$GRADLE_FILE"
          sed -i "s/versionName \"[^\"]*\"/versionName \"1.0.$BUILD_NUMBER\"/" "$GRADLE_FILE"

      - name: Build debug APK (for testing — no keystore needed)
        script: |
          export JAVA_HOME=$(/usr/libexec/java_home -v 21)
          chmod +x artifacts/samanyanga/android/gradlew
          cd artifacts/samanyanga/android
          ./gradlew assembleDebug

      - name: Build release APK (only if keystore is configured)
        script: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "No keystore configured — skipping release build."
            exit 0
          fi
          export JAVA_HOME=$(/usr/libexec/java_home -v 21)
          chmod +x artifacts/samanyanga/android/gradlew
          cd artifacts/samanyanga/android
          mkdir -p app/keystore
          echo "$KEYSTORE_B64" | base64 -d > app/keystore/release.jks
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="$(pwd)/app/keystore/release.jks" \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

    artifacts:
      - artifacts/samanyanga/android/app/build/outputs/apk/debug/app-debug.apk
      - artifacts/samanyanga/android/app/build/outputs/apk/release/app-release.apk

    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true
