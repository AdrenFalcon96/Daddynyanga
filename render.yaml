services:
  # ── API Web Service ────────────────────────────────────────────────────────
  - type: web
    name: samanyanga-api
    env: node
    plan: free
    region: oregon
    healthCheckPath: /api/healthz

    buildCommand: |
      npm install -g pnpm@10
      pnpm install --frozen-lockfile
      pnpm --filter @workspace/api-server run build

    startCommand: node artifacts/api-server/dist/index.mjs

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

      # Required secrets — set these in the Render dashboard
      # JWT_SECRET is OPTIONAL: if omitted, it is derived from DATABASE_URL automatically
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: SISIF_AI_API_KEY
        sync: false

  # ── Static Website (Frontend) ──────────────────────────────────────────────
  - type: static
    name: samanyanga-web
    buildCommand: |
      npm install -g pnpm@10
      pnpm install --frozen-lockfile
      BASE_PATH=/ pnpm --filter @workspace/samanyanga run build

    staticPublishPath: artifacts/samanyanga/dist/public

    # SPA fallback: all routes serve index.html
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    envVars:
      - key: VITE_API_URL
        value: https://samanyanga-api-qayq.onrender.com
      - key: BASE_PATH
        value: /
