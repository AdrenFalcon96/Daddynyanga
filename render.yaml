services:
  - type: web
    name: samanyanga-companion
    env: node
    plan: free
    buildCommand: |
      npm install -g pnpm@10
      pnpm install --frozen-lockfile
      BASE_PATH=/ pnpm --filter @workspace/samanyanga run build
      pnpm --filter @workspace/api-server run build
      mkdir -p artifacts/api-server/public
      cp -r artifacts/samanyanga/dist/public/. artifacts/api-server/public/
    startCommand: node artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SERVE_STATIC
        value: "true"
      - key: STATIC_DIR
        value: artifacts/api-server/public
      - key: BASE_PATH
        value: /
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: SISIF_AI_API_KEY
        sync: false
